<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'">
  <title>Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .splash {
      background: #1a1a2e;
      border: 1px solid rgba(124, 58, 237, 0.4);
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .splash-icon {
      width: 48px;
      height: 48px;
    }
    .splash-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }
    .spinner-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(124, 58, 237, 0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .splash-status {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="splash-icon" src="../../assets/claude-icon.png" alt="">
    <span class="splash-title">Claude Usage Monitor</span>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="splash-status">데이터 불러오는 중...</span>
    </div>
  </div>
</body>
</html>
